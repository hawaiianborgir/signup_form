<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoebill Fans Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <img src="" alt="">
        <div class="content-wrapper">
            <header>
                <p>This is a mockup of a sign-up page of the Shoebill Fans Club website. Yes, the Dino Bird with its majestic beak and unbelievable size.</p>
                <p>Become the dino bird fan now!</p>
            </header>
            
            <form id="main-form" method="get">
                <p>Sign-up now for a free shoebill plushie!</p>
                <div class="form-name">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name">
                </div>
                <div class="form-mailphone">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone-number">
                </div>
                <div class="form-password">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password">
                    <label for="password-confirmation"></label>
                    <input type="password" id="password-confirmation" name="password-confirmation">
                </div>
            </form>
            
            <footer>
                <button type="submit" form="main-form">Create Account</button>
                <p>Already have an account? <a href="https://youtu.be/xvFZjo5PgG0?si=3H4lBQNop5w019rL" target="_blank" rel="noopener noreferrer">Log in</a></p>
            </footer>
        </div>
    </div>
</body>
</html>
